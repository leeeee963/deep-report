<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>{{TITLE}}</title><style>
:root{--ink:#141414;--mut:#666;--faint:#999;--line:#e7e7e7;--paper:#fff}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{background:var(--paper);color:var(--ink);
 font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Hiragino Sans GB","Microsoft YaHei",system-ui,sans-serif;
 -webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;line-height:1.8;font-size:17px}
#prog{position:fixed;top:0;left:0;height:2px;background:var(--ink);width:0;z-index:50}
nav{position:fixed;top:0;left:0;width:248px;height:100vh;overflow-y:auto;padding:54px 22px 40px;border-right:1px solid var(--line)}
nav .nt{font-size:12px;letter-spacing:.12em;color:var(--faint);margin-bottom:18px}
nav a{display:block;font-size:13.5px;line-height:1.5;color:var(--mut);text-decoration:none;padding:7px 0;border-bottom:1px solid var(--line)}
nav a .nn{color:var(--faint);font-variant-numeric:tabular-nums;margin-right:8px}
nav a:hover{color:var(--ink)}
nav a.on{color:var(--ink);font-weight:600}
nav a.on .nn{color:var(--ink)}
main{max-width:720px;margin:0 auto;padding:84px 32px 140px}
.cover{margin-bottom:64px;padding-bottom:34px;border-bottom:1px solid var(--line)}
h1{font-size:34px;font-weight:800;letter-spacing:-.02em;line-height:1.25}
.cover .sub{font-size:19px;color:var(--mut);margin-top:14px;font-weight:600;letter-spacing:-.01em}
.cover .meta{font-size:13px;color:var(--faint);margin-top:22px;letter-spacing:.02em}
section{margin-bottom:18px;padding-top:30px}
h2{font-size:25px;font-weight:750;letter-spacing:-.01em;line-height:1.35;margin:40px 0 18px}
section>h2:first-child{margin-top:0}
h3{font-size:18px;font-weight:700;margin:30px 0 12px}
p{margin:14px 0}
ul,ol{margin:14px 0 14px 1.3em}
li{margin:7px 0}
strong{font-weight:700}
table{width:100%;border-collapse:collapse;margin:22px 0;font-size:14.5px}
th,td{text-align:left;vertical-align:top;padding:10px 12px;border-bottom:1px solid var(--line);line-height:1.6}
thead th{border-bottom:1.5px solid var(--ink);font-weight:700;color:var(--ink)}
tbody tr:last-child td{border-bottom:1px solid var(--ink)}
sup.cite{font-size:11px;line-height:0}
sup.cite a{color:var(--mut);text-decoration:none;font-variant-numeric:tabular-nums;padding:0 1px}
sup.cite a:hover{color:var(--ink)}
ol.src{margin:34px 0 0;padding:22px 0 0 0;border-top:1px solid var(--line);list-style:none;counter-reset:s}
ol.src li{counter-increment:s;font-size:12.5px;line-height:1.6;color:var(--mut);padding-left:30px;position:relative;margin:9px 0}
ol.src li::before{content:counter(s);position:absolute;left:0;top:0;font-variant-numeric:tabular-nums;color:var(--faint)}
ol.src a{color:var(--mut);text-decoration:none;border-bottom:1px solid var(--line);word-break:break-all}
ol.src a:hover{color:var(--ink)}
ol.src .pub{color:var(--faint)}
@media(max-width:920px){nav{display:none}main{padding:60px 22px 100px}}
</style><body><div id="prog"></div><nav><div class="nt">目录</div>
{{NAV}}
</nav><main><div class="cover"><h1>{{TITLE}}</h1><div class="sub">{{SUB}}</div><div class="meta">{{META}}</div></div>
{{SECTIONS}}
</main>
<script>
var bar=document.getElementById('prog');
var navlinks=[].slice.call(document.querySelectorAll('nav a'));
var secs=navlinks.map(function(a){return document.getElementById(a.getAttribute('href').slice(1));});
function onscroll(){
 var h=document.documentElement;
 var sc=h.scrollTop||document.body.scrollTop;
 var max=h.scrollHeight-h.clientHeight;
 bar.style.width=(max>0?sc/max*100:0)+'%';
 var idx=0;
 for(var i=0;i<secs.length;i++){ if(secs[i]&&secs[i].getBoundingClientRect().top<=130) idx=i; }
 navlinks.forEach(function(a,i){ a.classList.toggle('on',i===idx); });
}
addEventListener('scroll',onscroll,{passive:true});
addEventListener('resize',onscroll);
onscroll();
</script></body></html>
